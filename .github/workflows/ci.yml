name: CI

on:
  push:
    branches: [main, "release/**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Opt into Node.js 24 now; required before June 2 2026 when it becomes
  # the forced default. Remove once all actions ship Node-24 natively.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Check ─────────────────────────────────────────────────────────────────
  check:
    name: Check (fmt + clippy + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install stable Rust with rustfmt + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Security audit (dependency CVEs)
        run: cargo audit

  # ── 2. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-features

      - name: Build release binary
        run: cargo build --release

  # ── 3. Release ───────────────────────────────────────────────────────────────
  release:
    name: Release binaries
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: cpv-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: cpv-linux-aarch64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: cpv-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: cpv-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: cpv-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release binary (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/cpv ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/${{ matrix.target }}/release/cpv.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── 4. Publish GitHub Release ─────────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate release notes from tag message
        id: notes
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ -f CHANGELOG.md ]; then
            awk "/^## $TAG/,/^## v/" CHANGELOG.md | head -n -1 > notes.md
          else
            echo "Release $TAG" > notes.md
          fi
          cat notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          body_path: notes.md
          files: |
            artifacts/cpv-linux-x86_64/cpv-linux-x86_64
            artifacts/cpv-linux-aarch64/cpv-linux-aarch64
            artifacts/cpv-macos-x86_64/cpv-macos-x86_64
            artifacts/cpv-macos-aarch64/cpv-macos-aarch64
            artifacts/cpv-windows-x86_64.exe/cpv-windows-x86_64.exe
          draft: false
          prerelease: ${{ contains(steps.notes.outputs.tag, '-') }}
